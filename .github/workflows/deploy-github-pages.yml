# Build the Vite app and publish to GitHub Pages.
# After the first successful run: Repo → Settings → Pages → Source: GitHub Actions.
#
# Your public URL will be either:
#   https://<username>.github.io/<repository>/   (normal repo), or
#   https://<username>.github.io/                (repo named <username>.github.io)

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Compute GitHub Pages base path and site URL
        id: pages
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
            echo "site=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO}/" >> "$GITHUB_OUTPUT"
            echo "site=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base }}
          VITE_SITE_URL: ${{ steps.pages.outputs.site }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
